<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PandaBites</title>
    <link rel="icon" type="image/png" href="assets/logos/Bar logo.PNG">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
    <div class="window-frame">
        <div class="app-container">
            <header class="header">
                <div class="header-logo go-home" onclick="window.location.href='/'">
                    <img src="assets/logos/pandabites.png" alt="PandaBites logo"
                        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\'%3E%3Ccircle cx=\'50\' cy=\'50\' r=\'50\' fill=\'%23d70f64\'/%3E%3C/svg%3E'">
                </div>
                <div class="flex-grow"></div>
                <div class="header-auth">
                    <div class="nav-item"><span class="icon text-primary">👤</span> Account</div>
                    <div class="nav-item"><span class="icon text-primary">🌐</span> EN</div>
                </div>
            </header>

            <h2 class="page-title main-heading">Track Your Order</h2>

            <div class="tracking-stepper card-box pink-tint-bg">
                 <div class="t-step active">
                     <div class="check-circle">✔</div>
                     <span>Order Placed</span>
                 </div>
                 <div class="t-line active"></div>
                 <div class="t-step active">
                     <div class="check-circle">✔</div>
                     <span>Preparing Your Food</span>
                 </div>
                 <div class="t-line active"></div>
                 <div class="t-step active">
                     <div class="check-circle">✔</div>
                     <span>Order Picked Up</span>
                 </div>
                 <div class="t-line active"></div>
                 <div class="t-step active">
                     <div class="check-circle">✔</div>
                     <span>Arriving Soon</span>
                 </div>
                 <div class="t-line"></div>
                 <div class="t-step">
                     <div class="check-circle empty"></div>
                     <span>Delivered</span>
                 </div>
            </div>

            <div class="tracking-grid">
                <div class="tracking-main">
                    <div class="card-box shadow-sm">
                        <h3 class="mb-3">Rider's Information</h3>
                        <div class="rider-info-flex">
                            <div class="rider-avatar" style="background-color: #ffcce0;"></div>
                            <div class="details">
                                <p><strong>Name:</strong> Kenji David</p>
                                <p><strong>Vehicle:</strong> Honda Click v3 125</p>
                                <p><strong>Mobile #:</strong> 639222555100</p>
                            </div>
                        </div>
                    </div>

                    <div class="card-box shadow-sm mt-4">
                        <div class="summary-header flex-between mb-3">
                            <h3>Order Summary</h3>
                            <button type="button" class="order-summary-toggle" id="orderSummaryToggle" aria-expanded="true" aria-controls="orderSummaryBody" aria-label="Show or hide order details">
                                <span class="order-summary-toggle__chev" aria-hidden="true"></span>
                            </button>
                        </div>
                        <div id="orderSummaryBody" class="summary-preview flex-start gap-4">
                            <div class="food-thumb-small" style="width: 80px; height: 60px;" id="trackingThumb"></div>
                            <div>
                                <h4 class="m-0" id="trackingRestaurant">—</h4>
                                <div class="text-sm m-0 mt-1" id="trackingItemsPreview">—</div>
                                <p class="text-sm text-muted m-0 mt-1" id="trackingOrderId">Order #—</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="tracking-sidebar">
                    <div class="card-box p-0 overflow-hidden shadow-sm pos-relative map-parent">
                        <div class="arrival-header">
                            <div class="clock-icon bg-primary text-white">🕒</div>
                            <div>
                                <h3 class="m-0" id="trackingEtaRange">Estimated Arrival: —</h3>
                                <p class="text-muted text-sm m-0 mt-1" id="trackingEtaSub">Arriving soon</p>
                            </div>
                        </div>
                        <div class="map-container" style="height: 250px; background-color: #fce4ec;" id="trackingMap"></div>
                    </div>
                </div>
            </div>

        </div>

        <a href="#" class="chat-support" aria-label="24/7 Chat Support">
            <div class="support-img-wrapper">
                <img src="assets/logos/support.png" alt="">
            </div>
            <div class="chat-badge">24/7 Chat Support</div>
        </a>
    </div>
    <script src="app.js"></script>
</body>
</html>
